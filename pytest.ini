[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts = -ra -p no:cacheprovider
markers =
    aut_api: tests that call the running external AUT service
    integration: tests that require multiple modules or running services
    ragas: tests that require RAGAS evaluation data and dependencies
    llm: tests that require live LLM or embedding API credentials
